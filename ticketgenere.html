<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexto - Votre Ticket</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
         <div class="logo">
      <img src="logo.png" alt="logo">
      <span>NEXTO</span>
    </div>
        <nav><a href="Landing.html">Accueil</a>
            <a href="#">Contact</a></nav>
    </header>

    <main class="main-wrapper">
        <section class="booking-card">
            <h1 class="title">Ticket genere</h1>
            <p class="subtitle">Votre ticket a ete cree avec succes</p>

            <div class="ticket-display">
                <div class="ticket-head">
                    <span class="ticket-id">B12</span>
                </div>
                <div class="ticket-body">
                    <div class="info-row">
                        <span class="label">SERVICE</span>
                        <span class="val">Etat Civil</span>
                    </div>
                    <div class="separator"></div>
                    <div class="info-row">
                        <span class="label">HEURE DU TICKET</span>
                        <span class="val">14:23</span>
                    </div>
                </div>
                <div class="wait-msg">Veuillez attendre votre tour</div>
            </div>

            <a href="Landing.html" class="btn-outline">Retour à l'accueil</a>
            <p class="footer-note">Vous serez notifie lorsque ce sera votre tour.</p>
        </section>
    </main>
</body>
</html>
