!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexto - Choisir un service</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
         <div class="logo">
      <img src="logo.png" alt="logo">
      <span>NEXTO</span>
    </div>
        <nav><a href="Landing.html">Accueil</a><a href="#">Contact</a></nav>
    </header>
    <main class="main-wrapper">
        <section class="booking-card">
            <h1 class="title">Bienvenue sur Nexto</h1>
            <p class="subtitle">Prenez un ticket pour votre service administratif</p>
             <div class="services-list">
    <input type="radio" id="cin" name="service" value="cin" hidden checked>
    <label for="cin" class="custom-button">Carte d'identité / Passeport</label>

    <input type="radio" id="permis" name="service" value="permis" hidden>
    <label for="permis" class="custom-button">Permis de conduire</label>

    <input type="radio" id="residence" name="service" value="residence" hidden>
    <label for="residence" class="custom-button">Certificat de résidence</label>

    <input type="radio" id="taxes" name="service" value="taxes" hidden>
    <label for="taxes" class="custom-button">Impôts / Taxes</label>
</div>
            <a href="ticketgenere.html" class="btn-primary">Prendre un ticket</a>
            <p class="footer-note">Veuillez patienter après avoir pris votre ticket</p>
        </section>
    </main>
</body>
</html>
