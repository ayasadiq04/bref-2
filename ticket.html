<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexto - Choisir un service</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">NEXTO</div>
        <nav><a href="Landing.html">Accueil</a><a href="#">Contact</a></nav>
    </header>

    <main class="main-wrapper">
        <section class="booking-card">
            <h1 class="title">Bienvenue sur <span>Nexto</span></h1>
            <p class="subtitle">Prenez un ticket pour votre service administratif</p>
            
            <div class="services-list">
                <button class="service-item">Carte d'identité / Passeport</button>
                <button class="service-item">Permis de conduire</button>
                <button class="service-item">Certificat de résidence</button>
                <button class="service-item">Impôts / Taxes</button>
            </div>

            <a href="ticketgenere.html" class="btn-primary">Prendre un ticket</a>
            <p class="footer-note">Veuillez patienter après avoir pris votre ticket</p>
        </section>
    </main>
</body>
</html>
