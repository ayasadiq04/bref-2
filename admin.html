<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexto - Panel Administration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

<header class="navbar admin-navbar">
    <div class="logo">
        <img src="logo.png" alt="logo"> NEXTO ADMIN
    </div>
    <nav><a href="Landing.html" class="guichet-badge" >Accueil</a></nav>
</header>

<main class="admin-wrapper-grid">
    
    <section class="current-ticket-section">
        <div class="card-status">
            <span class="status-label">TICKET EN COURS</span>
            <h1 class="main-ticket-number">B12</h1>
            <p class="service-name">Service: <strong>Permis de conduire</strong></p>
            
            <div class="action-buttons">
                <a href="admin.html" class="btn-call">
                    <i class="fas fa-play"></i> Appeler Suivant
                </a>
                <button class="btn-stop">
                    <i class="fas fa-times"></i> 
                    <a href="Landing.html">Annuler</a> 
                </button>
            </div>
        </div>
    </section>

    <section class="queue-management">
        <div class="list-container">
            <h3 class="list-title">En attente <span class="count">4</span></h3>
            <div class="ticket-row">
                <span class="ticket-id">B13</span>
                <span class="ticket-time">14:30</span>
                <i class="fas fa-chevron-right icon-fade"></i>
            </div>
            <div class="ticket-row">
                <span class="ticket-id">B14</span>
                <span class="ticket-time">14:35</span>
                <i class="fas fa-chevron-right icon-fade"></i>
            </div>
            <div class="ticket-row">
                <span class="ticket-id">B15</span>
                <span class="ticket-time">14:40</span>
                <i class="fas fa-chevron-right icon-fade"></i>
            </div>
        </div>

        <div class="list-container history">
            <h3 class="list-title">Historique (Terminés)</h3>
            <div class="ticket-row done">
                <span class="ticket-id">B11</span>
                <span class="ticket-status">Terminé</span>
            </div>
            <div class="ticket-row done">
                <span class="ticket-id">B10</span>
                <span class="ticket-status">Terminé</span>
            </div>
        </div>
    </section>

</main>

</body>
</html>
