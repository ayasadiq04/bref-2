<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexto - Choisir un service</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style2.css">
</head>
<body>
<header class="navbar admin-header">
    <div class="logo">NEXTO <span class="badge-admin">ADMIN PANEL</span></div>
    <div class="guichet-info">Guichet N° 01</div>
</header>

<main class="admin-container">
    <section class="admin-main">
        <div class="current-ticket-card">
            <span class="label">TICKET EN TRAITEMENT</span>
            <h2 class="big-number">B12</h2>
            <p>Service: Permis de conduire</p>
            <div class="admin-actions">
                <button class="btn-primary btn-next"><i class="fas fa-arrow-right"></i> Appeler suivant</button>
                <button class="btn-cancel"><i class="fas fa-times"></i> Annuler ticket</button>
            </div>
        </div>
        
        <button class="btn-reset">Réinitialiser la file</button>
    </section>

    <div class="lists-wrapper">
        <div class="list-column">
            <h3>En attente (4)</h3>
            <div class="ticket-mini"><span>B13</span> <small>14:30</small></div>
            <div class="ticket-mini"><span>B14</span> <small>14:35</small></div>
        </div>
        <div class="list-column">
            <h3>Historique</h3>
            <div class="ticket-mini done"><span>B11</span> <small>Terminé</small></div>
            <div class="ticket-mini done"><span>B10</span> <small>Terminé</small></div>
        </div>
    </div>
</main>
</body>
</html>
